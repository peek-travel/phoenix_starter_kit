name: PR Title (Conventional Commits)

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint-pr-title:
    name: Lint PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types — keep in sync with .convco and CONTRIBUTING.md
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            test
            ci
            build
          requireScope: false
          # Release PRs opened by bin/release are exempt from the type prefix
          ignoreLabels: release
